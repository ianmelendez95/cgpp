<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Subdivide Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;

      background-color: #2e2e2e;
    }

    #screen-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      /* border: 2px solid green */
    }

    #toolbar {
      display: flex;
      flex: 0 0 auto;
      flex-wrap: wrap;
      border-bottom-width: 1px;
      border-bottom-color: gray;
      border-bottom-style: solid;
      padding: 1rem;
    }

    .toolbar-input:not(:first-child) {
      margin-left: 1rem;
    }

    #cgpp-canvas {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: block;
      /* border: 2px solid blue; */
      box-sizing: border-box
    }
  </style>
</head>

<body>
  <div id="screen-container">
    <div id="toolbar">
      <input id="subdivide-button" type="button" class="toolbar-input" value="Subdivide"/>
      <div class="toolbar-input" style="display: flex; flex-direction: column; align-items: center;">
        <input 
          id="alpha-range" 
          type="range" 
          class="toolbar-input" 
          value="0.5"
          min="0"
          max="1"
          step="0.01"
        />
        <div id="alpha-display" style="color: #ffffff">0.5</div>
      </div>
    </div>
    <canvas id="cgpp-canvas"></canvas>
  </div>
  <script type="module" src="../src/demo/subdivideDemo.ts"></script>
</body>

</html>
