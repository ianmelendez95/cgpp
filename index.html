<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>My first three.js app</title>
  <style>
    body {
      margin: 0;
    }

    #screen-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      border: 2px solid green
    }

    #toolbar {
      display: flex;
      height: 2rem;
      border: 2px solid red
    }

    #cgpp-canvas {
      display: flex;
      flex-grow: 10;
      width: 100%;
      height: auto;
      display: block;
      border: 2px solid blue;
      box-sizing: border-box
    }
  </style>
</head>

<body>
  <div id="screen-container">
    <div id="toolbar">

    </div>
    <canvas id="cgpp-canvas"></canvas>
  </div>
  <script type="module" src="src/main.ts"></script>
</body>

</html>
