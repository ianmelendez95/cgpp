<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>My first three.js app</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;

      background-color: #2e2e2e;
    }

    #screen-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      /* border: 2px solid green */
    }

    #toolbar {
      display: flex;
      flex: 0 0 auto;
      flex-wrap: wrap;
      border-bottom-width: 1px;
      border-bottom-color: gray;
      border-bottom-style: solid;
      padding: 1rem;
    }

    #cgpp-canvas {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: block;
      /* border: 2px solid blue; */
      box-sizing: border-box
    }
  </style>
</head>
